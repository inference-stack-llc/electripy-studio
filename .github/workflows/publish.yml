name: Publish to PyPI

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Version to publish (must match pyproject.toml, e.g. 0.1.0)"
        required: true
        type: string
      dry_run:
        description: "Dry run — build only, skip upload"
        required: false
        type: boolean
        default: false

jobs:
  quality-gate:
    name: Quality gate
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - run: pip install -e ".[dev]"
      - run: ruff check .
      - run: black --check .
      - run: mypy src/
      - run: pytest tests/ -q

  build:
    name: Build distribution
    needs: quality-gate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install build
      - name: Verify version matches input
        run: |
          PKG_VERSION=$(python -c "import tomllib; print(tomllib.load(open('pyproject.toml','rb'))['project']['version'])")
          if [ "$PKG_VERSION" != "${{ inputs.version }}" ]; then
            echo "::error::pyproject.toml version ($PKG_VERSION) does not match input (${{ inputs.version }})"
            exit 1
          fi
      - run: python -m build
      - name: Verify dist contents
        run: |
          ls -lh dist/
          python -m zipfile -l dist/*.whl | head -20
      - uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  publish:
    name: Publish to PyPI
    if: ${{ !inputs.dry_run }}
    needs: build
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write  # Required for trusted publishing
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/
      - uses: pypa/gh-action-pypi-publish@release/v1
