name: Bug Report
description: Report a bug in ElectriPy
labels: ["bug"]
body:
  - type: textarea
    id: description
    attributes:
      label: Describe the bug
      description: A clear and concise description of what the bug is.
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Steps to reproduce
      description: Minimal code or steps to reproduce the issue.
      placeholder: |
        ```python
        from electripy import ...
        ```
    validations:
      required: true
  - type: input
    id: python-version
    attributes:
      label: Python version
      placeholder: "3.11.8"
    validations:
      required: true
  - type: input
    id: electripy-version
    attributes:
      label: ElectriPy version
      placeholder: "0.1.0"
    validations:
      required: true
  - type: input
    id: os
    attributes:
      label: Operating system
      placeholder: "macOS 15.3 / Ubuntu 24.04 / Windows 11"
    validations:
      required: false
  - type: textarea
    id: traceback
    attributes:
      label: Traceback / error output
      render: shell
    validations:
      required: false
