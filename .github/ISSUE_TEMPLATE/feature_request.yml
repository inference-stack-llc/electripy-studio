name: Feature Request
description: Suggest a new feature or enhancement
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem or motivation
      description: What problem does this feature solve? What use case does it enable?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: Describe the API or behaviour you'd like to see.
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Any alternative approaches you've thought about.
    validations:
      required: false
  - type: dropdown
    id: component
    attributes:
      label: Component
      options:
        - Core
        - Concurrency
        - I/O
        - CLI
        - AI — LLM Gateway
        - AI — Policy Gateway
        - AI — Agent Collaboration
        - AI — RAG Eval Runner
        - AI — Telemetry
        - AI — Product Engineering
        - Documentation
        - Other
    validations:
      required: true
