site_name: ElectriPy Studio
site_url: https://inference-stack-llc.github.io/electripy-studio/
site_description: >-
  Production-grade Python toolkit for AI product engineering — LLM gateway,
  provider failover, JSON repair, cost tracking, RAG evaluation, policy
  guardrails, circuit breaker, PII scanning, and 30+ composable utilities.
site_author: Inference Stack
repo_url: https://github.com/inference-stack-llc/electripy-studio
repo_name: inference-stack-llc/electripy-studio

theme:
  name: material
  palette:
    - scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - search.suggest
    - search.highlight
    - content.code.copy

nav:
  - Home: index.md
  - Getting Started:
      - Installation: getting-started/installation.md
      - Quickstart: getting-started/quickstart.md
  - User Guide:
      - Core: user-guide/core.md
      - Concurrency: user-guide/concurrency.md
      - IO: user-guide/io.md
      - CLI: user-guide/cli.md
      - AI / LLM Gateway: user-guide/ai-llm-gateway.md
      - AI / Provider Adapters: user-guide/ai-provider-adapters.md
      - AI / Structured Output: user-guide/ai-structured-output.md
      - AI / LLM Caching: user-guide/ai-llm-cache.md
      - AI / Replay Tape: user-guide/ai-replay-tape.md
      - AI / Eval Assertions: user-guide/ai-eval-assertions.md
      - AI / RAG Eval Runner: user-guide/ai-rag-eval-runner.md
      - AI Product Engineering: user-guide/ai-product-engineering.md
      - AI Telemetry: user-guide/ai-telemetry.md
      - AI / Policy Gateway: user-guide/ai-policy-gateway.md
      - AI / Agent Collaboration: user-guide/ai-agent-collaboration.md
      - AI / Fallback Chain: user-guide/ai-fallback-chain.md
      - AI / Batch Complete: user-guide/ai-batch-complete.md
      - AI / Cost Ledger: user-guide/ai-cost-ledger.md
      - AI / Prompt Fingerprint: user-guide/ai-prompt-fingerprint.md
      - AI / JSON Repair: user-guide/ai-json-repair.md
      - AI / Sensitive Data Scanner: user-guide/ai-sensitive-data-scanner.md
      - Concurrency / Circuit Breaker: user-guide/circuit-breaker.md
      - Component Maturity Model: user-guide/component-maturity.md
  - Recipes:
      - CLI Tool: recipes/cli-tool.md
      - RAG Evaluation Runner: recipes/rag-eval-runner.md
      - AI Telemetry: recipes/ai-telemetry.md
      - Policy-Governed LLM Flow: recipes/policy-gateway.md
      - Agent Collaboration Runtime: recipes/agent-collaboration-runtime.md
      - Policy + Collaboration E2E: recipes/policy-collaboration-e2e.md
  - API Reference: api.md

markdown_extensions:
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences
  - admonition
  - pymdownx.details
  - pymdownx.tabbed:
      alternate_style: true

plugins:
  - search

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/inference-stack-llc/electripy-studio
    - icon: fontawesome/brands/python
      link: https://pypi.org/project/electripy-studio/
