site_name: ElectriPy Studio
site_description: Production-minded Python components and recipes
site_author: Inference Stack
repo_url: https://github.com/reactlabs-dev/electripy-studio
repo_name: reactlabs-dev/electripy-studio

theme:
  name: material
  palette:
    - scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - search.suggest
    - search.highlight
    - content.code.copy

nav:
  - Home: index.md
  - Getting Started:
      - Installation: getting-started/installation.md
      - Quickstart: getting-started/quickstart.md
  - User Guide:
      - Core: user-guide/core.md
      - Concurrency: user-guide/concurrency.md
      - IO: user-guide/io.md
      - CLI: user-guide/cli.md
  - Recipes:
      - CLI Tool: recipes/cli-tool.md
  - API Reference: api.md

markdown_extensions:
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences
  - admonition
  - pymdownx.details
  - pymdownx.tabbed:
      alternate_style: true

plugins:
  - search
